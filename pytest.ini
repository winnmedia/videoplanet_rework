[tool:pytest]
DJANGO_SETTINGS_MODULE = vridge.settings.test
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --cov=.
    --cov-report=term-missing:skip-covered
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=70
    --maxfail=1
    --disable-warnings
    -p no:warnings
testpaths = 
    users
    projects
    feedbacks
    onlines
    core
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (database, external services)
    slow: Slow tests (performance, load testing)
    smoke: Smoke tests (critical paths)
    regression: Regression tests
    security: Security tests
    
# 커버리지 설정
[coverage:run]
omit = 
    */migrations/*
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */env/*
    manage.py
    */settings/*
    */wsgi.py
    */asgi.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov